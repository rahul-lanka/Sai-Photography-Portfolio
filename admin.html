<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Upload</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-shell">
    <header class="header">
    <div class="logo">Sai Frames</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
      <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
      <!-- <button id="login-btn">Login</button> -->
      <button id="logout-btn" class="nav-btn">Logout</button>
    </nav>
  </header>

  <section class="section page-top admin-page">
    <div class="section-head" data-reveal>
      <p class="section-kicker">Control Center</p>
      <h2>Upload Event Photos</h2>
      <p>Create private galleries for clients in a few steps.</p>
    </div>

    <div class="admin-form" data-reveal>
      <input type="email" id="client-email" placeholder="Client Email" />

      <select id="event-type">
        <option value="marriage">Marriage</option>
        <option value="prewedding">Pre Wedding</option>
        <option value="birthday">Birthday</option>
        <option value="baby">Baby Event</option>
      </select>

      <input type="file" id="photos" multiple />

      <button id="upload-btn" class="btn btn-primary">Upload Photos</button>
      <p id="status" class="status-text"></p>
    </div>
  </section>

    <script src="js/main.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/initAuth.js"></script>

    
</body>
</html>
